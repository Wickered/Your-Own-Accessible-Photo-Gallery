<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Photo Gallery</title>
    <link rel="stylesheet" href="gallery.css">
</head>
<body>

    <div id="image" tabindex="0">
        Hover or focus on an image below to display here.
    </div>

    <div class="gallery">
        <img class="preview" alt="Ragdoll Cat" src="images/ragdoll.jpg"
            onmouseover="upDate(this)" onmouseout="unDo()"
            onfocus="upDate(this)" onblur="unDo()">

        <img class="preview" alt="Munchkin Kitty" src="images/munchkin.jpg"
            onmouseover="upDate(this)" onmouseout="unDo()"
            onfocus="upDate(this)" onblur="unDo()">

        <img class="preview" alt="Samoyed Dog" src="images/samoyed.jpg"
            onmouseover="upDate(this)" onmouseout="unDo()"
            onfocus="upDate(this)" onblur="unDo()">

        <img class="preview" alt="Shibe" src="images/shiba.jpg"
            onmouseover="upDate(this)" onmouseout="unDo()"
            onfocus="upDate(this)" onblur="unDo()">

        <img class="preview" alt="Arctic Fox" src="images/arcticfox.jpg"
            onmouseover="upDate(this)" onmouseout="unDo()"
            onfocus="upDate(this)" onblur="unDo()">

        <img class="preview" alt="Smol Rabbit" src="images/dwarf.jpg"
            onmouseover="upDate(this)" onmouseout="unDo()"
            onfocus="upDate(this)" onblur="unDo()">
    </div>

    <script src="js/gallery.js"></script>
</body>
</html>
